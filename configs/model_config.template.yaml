# Model and API Configuration for PaperVizAgent

# Default Models
defaults:
  model_name: "" # e.g., "gpt-5.4"
  image_model_name: "" # e.g., "gemini-3-pro-image-preview"
  
# API Keys. If you are using all gemini models, you can leave the other keys empty.
api_keys:
  google_api_key: ""
  openai_api_key: ""
  anthropic_api_key: ""

google_compatible:
  base_url: ""

openai_compatible:
  api_key: ""
  text_api_key: ""
  image_api_key: ""
  text_base_url: ""
  image_base_url: ""
  file_base_url: ""

ui_defaults:
  text_provider: "openai_compatible"
  image_provider: "openai_compatible"
  paper_file_path: ""
